<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Project: Admin Dashboard </title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

        <nav class="sidebar">

            </div>
            
            <ul class="sidebar-menu">
                <li class="sidebar-menu-item">
                    <img src="./icons/sidebar-home.svg" alt="Home icon" class="sidebar-menu-item-icon">
                    <a href="#" class="sidebar-menu-item-text">Home</a>
                </li>
                <li class="sidebar-menu-item">
                    <img src="./icons/sidebar-profile.svg" alt="Profile icon" class="sidebar-menu-item-icon">

                <li class="sidebar-menu-item">

                <li class="sidebar-menu-item">

                <li class="sidebar-menu-item">
                    <img src="./icons/sidebar-tasks.svg" alt="Tasks icon" class="sidebar-menu-item-icon">

                </li>
                <li class="sidebar-menu-item">
                    <img src="./icons/sidebar-communities.svg" alt="Communities icon" class="sidebar-menu-item-icon">

                </li>

            <ul class="sidebar-menu">

                    <img src="./icons/sidebar-settings.svg" alt="Settings icon" class="sidebar-menu-item-icon">

                </li>
                <li class="sidebar-menu-item">
                    <img src="./icons/sidebar-support.svg" alt="Support icon" class="sidebar-menu-item-icon">
                    <a href="#" class="sidebar-menu-item-text">Support</a>
                </li>
                <li class="sidebar-menu-item">
                    <img src="./icons/sidebar-privacy.svg" alt="Privacy icon" class="sidebar-menu-item-icon">
                    <a href="#" class="sidebar-menu-item-text">Privacy</a>

            MAIN
